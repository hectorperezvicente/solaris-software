server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/css text/plain application/json application/xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'unsafe-inline';" always;

    # Cache static assets aggressively
    location ~* \.(css|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML: no cache (so updates are instant)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # No access logs for favicon noise
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
