services:
  web:
    image: nginx:alpine
    container_name: solaris-web
    ports:
      - "9173:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro,z
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
