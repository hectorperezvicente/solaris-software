name: Deploy Website

on:
  push:
    paths:
      - 'website/**'
  pull_request:
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}" 2>/dev/null || true
          sudo rm -rf "${{ github.workspace }}"/* "${{ github.workspace }}"/.??* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Verify privacy directives
        run: |
          NGINX_CONF="${{ github.workspace }}/website/nginx.conf"
          FAILED=0

          grep -q "access_log off" "$NGINX_CONF" || { echo "FAIL: access_log off missing"; FAILED=1; }
          grep -q "error_log /dev/null" "$NGINX_CONF" || { echo "FAIL: error_log /dev/null missing"; FAILED=1; }
          grep -q "real_ip_header" "$NGINX_CONF" && { echo "FAIL: real_ip_header must not be present"; FAILED=1; }

          [ $FAILED -eq 0 ] && echo "OK: all privacy directives verified" || exit 1

      - name: Scan for secrets and misconfigurations
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/website:/scan" \
            aquasec/trivy:latest fs /scan \
            --scanners secret,misconfig \
            --severity HIGH,CRITICAL \
            --exit-code 1

  deploy:
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}" 2>/dev/null || true
          sudo rm -rf "${{ github.workspace }}"/* "${{ github.workspace }}"/.??* 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Generate version manifest
        run: |
          # files_hash: covers source files only (reproducible from git checkout, excludes version.json)
          # awk strips paths from intermediate output so the hash is path-independent
          find "${{ github.workspace }}"/website/html -type f | sort | xargs sha256sum | awk '{print $1}' | sha256sum | awk '{print $1}' > /tmp/files_hash.txt
          cat <<EOF > "${{ github.workspace }}"/website/html/version.json
          {
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files_hash": "$(cat /tmp/files_hash.txt)"
          }
          EOF
          # manifest.sha256: covers ALL deployed files including version.json (not self-referential)
          # compute into a temp file first — bash truncates the redirect target before the pipeline
          # starts, so a direct redirect would include an empty manifest.sha256 in its own hash
          find "${{ github.workspace }}"/website/html -type f | sort | xargs sha256sum | awk '{print $1}' | sha256sum | awk '{print $1}' > /tmp/manifest_hash.txt
          cp /tmp/manifest_hash.txt "${{ github.workspace }}"/website/html/manifest.sha256

      - name: Deploy website files
        run: |
          cp -r "${{ github.workspace }}"/website/. /home/solaris/solaris-web/

      - name: Restart web container
        working-directory: /home/solaris/solaris-web
        run: |
          docker compose down
          docker compose up -d
