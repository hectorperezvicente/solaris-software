name: ESP-IDF Build
on: [push]

env:
  CI_IMAGE: ghcr.io/software-solaris/solaris-software/solaris-ci:latest

jobs:
  build-ci-image:
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - name: Fix permissions from previous Docker runs
        run: |
          sudo chmod -R 777 "${{ github.workspace }}" || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Check if image needs rebuild
        id: check
        run: |
          if docker pull "$CI_IMAGE" 2>/dev/null; then
            LOCAL_HASH=$(sha256sum .github/Dockerfile.ci | cut -d' ' -f1)
            REMOTE_HASH=$(docker inspect "$CI_IMAGE" --format '{{index .Config.Labels "dockerfile.hash"}}' 2>/dev/null || echo "")
            if [ "$LOCAL_HASH" = "$REMOTE_HASH" ]; then
              echo "rebuild=false" >> "$GITHUB_OUTPUT"
            else
              echo "rebuild=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push CI image
        if: steps.check.outputs.rebuild == 'true'
        run: |
          HASH=$(sha256sum .github/Dockerfile.ci | cut -d' ' -f1)
          echo "${{ secrets.CI_GH_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -f .github/Dockerfile.ci --label "dockerfile.hash=$HASH" -t "$CI_IMAGE" .
          docker push "$CI_IMAGE"

  build-solaris-code:
    needs: build-ci-image
    runs-on: self-hosted

    container:
      image: ghcr.io/${{ github.repository }}/solaris-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.CI_GH_TOKEN }}
      options: >-
        --security-opt label=disable

    steps:
      - name: Fix permissions for GitHub workspace
        run: |
          chmod -R 777 "$GITHUB_WORKSPACE" || true
          chmod -R 777 /__w || true

      - name: Wipe workspace
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
          token: ${{ secrets.CI_GH_TOKEN }}
          clean: true

      - name: Mark workspace as safe for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Purge submodule cache
        run: |
          rm -rf .git/modules/* || true
          rm -rf solaris-v1/external/esp-idf solaris-v1/external/spp solaris-v1/external/spp-ports || true

      - name: Force HTTPS for submodules and authenticate
        run: |
          if [ -f .gitmodules ]; then
            sed -i \
              -e 's#git@github.com:#https://github.com/#g' \
              -e 's#ssh://git@github.com:#https://github.com/#g' \
              .gitmodules
          fi
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git submodule sync --recursive

      - name: Initialize submodules
        run: |
          git submodule update --init solaris-v1/external/spp
          git submodule update --init solaris-v1/external/spp-ports
          git submodule add -f https://github.com/espressif/esp-idf.git solaris-v1/external/esp-idf
          cd solaris-v1/external/esp-idf
          git checkout v5.1

      - name: Build firmware
        run: |
          cd solaris-v1
          . /opt/esp/idf/export.sh
          idf.py build

  static-analysis:
    needs: build-ci-image
    runs-on: self-hosted

    container:
      image: ghcr.io/${{ github.repository }}/solaris-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.CI_GH_TOKEN }}
      options: >-
        --security-opt label=disable

    steps:
      - name: Fix permissions for GitHub workspace
        run: |
          chmod -R 777 "$GITHUB_WORKSPACE" || true
          chmod -R 777 /__w || true

      - name: Wipe workspace
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Mark workspace as safe for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run cppcheck with MISRA (XML output)
        run: |
          mkdir -p doc/cppcheck
          cppcheck \
            --addon=misra \
            --enable=all \
            --std=c11 \
            --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --xml \
            -I solaris-v1/components/icm_driver/include \
            -I solaris-v1/components/general \
            -I solaris-v1/components/pressure_sensor_driver/include \
            -I solaris-v1/external/spp/core \
            -I solaris-v1/external/spp/hal/spi \
            -I solaris-v1/external/spp/osal \
            -I solaris-v1/external/spp/services/logging \
            solaris-v1/main/*.c \
            solaris-v1/components/icm_driver/*.c \
            solaris-v1/components/pressure_sensor_driver/*.c \
            solaris-v1/components/general/*.c \
            2> cppcheck-result.xml

      - name: Generate HTML report
        run: |
          cppcheck-htmlreport \
            --file=cppcheck-result.xml \
            --title="Solaris MISRA-C Report" \
            --report-dir=doc/cppcheck \
            --source-dir=.

      - name: Commit and push MISRA report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/${{ github.repository }}.git"
          git add doc/cppcheck/
          git diff --cached --quiet && echo "No report changes" || (git commit -m "docs: update MISRA-C report [skip ci]" && git push origin HEAD:${{ github.ref_name }})

  unit-tests:
    needs: [build-ci-image, static-analysis]
    runs-on: self-hosted

    container:
      image: ghcr.io/${{ github.repository }}/solaris-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.CI_GH_TOKEN }}
      options: >-
        --security-opt label=disable

    steps:
      - name: Fix permissions for GitHub workspace
        run: |
          chmod -R 777 "$GITHUB_WORKSPACE" || true
          chmod -R 777 /__w || true

      - name: Wipe workspace
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Build and run tests
        run: |
          cd solaris-v1/components/icm_driver/tests
          mkdir -p build && cd build
          cmake ..
          make
          ctest --output-on-failure

  generate-docs:
    needs: [build-ci-image, static-analysis]
    runs-on: self-hosted

    container:
      image: ghcr.io/${{ github.repository }}/solaris-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.CI_GH_TOKEN }}
      options: >-
        --security-opt label=disable

    steps:
      - name: Fix permissions for GitHub workspace
        run: |
          chmod -R 777 "$GITHUB_WORKSPACE" || true
          chmod -R 777 /__w || true

      - name: Wipe workspace
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
          token: ${{ secrets.CI_GH_TOKEN }}
          clean: true

      - name: Mark workspace as safe for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate documentation
        run: |
          doxygen Doxyfile
          cd doc/latex
          make pdf

      - name: Copy PDF to doc/
        run: |
          cp doc/latex/refman.pdf doc/solaris-software.pdf
          rm -rf doc/latex

      - name: Commit and push documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/${{ github.repository }}.git"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add doc/solaris-software.pdf
          git diff --cached --quiet && echo "No doc changes" || (git commit -m "docs: update generated documentation [skip ci]" && git push origin HEAD:${{ github.ref_name }})
