name: ESP-IDF Build
on: [push]

env:
  CI_IMAGE: solaris-ci:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ci-image:
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" espressif/idf:v6.0-dev rm -rf /workspace/* /workspace/.??* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Build CI image if needed
        run: |
          LOCAL_HASH=$(sha256sum .github/Dockerfile.ci | cut -d' ' -f1)
          REMOTE_HASH=$(docker inspect "$CI_IMAGE" --format '{{index .Config.Labels "dockerfile.hash"}}' 2>/dev/null || echo "")
          if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
            echo "Rebuilding CI image..."
            docker build -f .github/Dockerfile.ci --label "dockerfile.hash=$LOCAL_HASH" -t "$CI_IMAGE" .
          else
            echo "CI image is up to date"
          fi

  build-solaris-code:
    needs: build-ci-image
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" espressif/idf:v6.0-dev rm -rf /workspace/* /workspace/.??* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Prepare submodules
        run: |
          git config --global --add safe.directory "${{ github.workspace }}"
          rm -rf .git/modules/* || true
          rm -rf solaris-v1/external/esp-idf solaris-v1/external/spp solaris-v1/external/spp-ports || true
          if [ -f .gitmodules ]; then
            sed -i \
              -e 's#git@github.com:#https://github.com/#g' \
              -e 's#ssh://git@github.com:#https://github.com/#g' \
              .gitmodules
          fi
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.CI_GH_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git submodule sync --recursive
          git submodule update --init solaris-v1/external/spp
          git submodule update --init solaris-v1/external/spp-ports
          git submodule add -f https://github.com/espressif/esp-idf.git solaris-v1/external/esp-idf
          cd solaris-v1/external/esp-idf
          git checkout v5.1

      - name: Build firmware
        run: |
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/solaris-v1 \
            $CI_IMAGE \
            bash -c '. /opt/esp/idf/export.sh && idf.py build'

  static-analysis:
    needs: build-ci-image
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" espressif/idf:v6.0-dev rm -rf /workspace/* /workspace/.??* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Run cppcheck with MISRA
        run: |
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            $CI_IMAGE \
            bash -c '
              mkdir -p doc/cppcheck
              cppcheck \
                --addon=misra \
                --enable=all \
                --std=c11 \
                --error-exitcode=0 \
                --suppress=missingIncludeSystem \
                --suppress=unusedFunction \
                --xml \
                -I solaris-v1/components/icm_driver/include \
                -I solaris-v1/components/general \
                -I solaris-v1/components/pressure_sensor_driver/include \
                -I solaris-v1/external/spp/core \
                -I solaris-v1/external/spp/hal/spi \
                -I solaris-v1/external/spp/osal \
                -I solaris-v1/external/spp/services/logging \
                solaris-v1/main/*.c \
                solaris-v1/components/icm_driver/*.c \
                solaris-v1/components/pressure_sensor_driver/*.c \
                solaris-v1/components/general/*.c \
                2> cppcheck-result.xml
              cppcheck-htmlreport \
                --file=cppcheck-result.xml \
                --title="Solaris MISRA-C Report" \
                --report-dir=doc/cppcheck \
                --source-dir=.
            '

      - name: Upload MISRA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: doc/cppcheck/

  unit-tests:
    needs: [build-ci-image, static-analysis]
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" espressif/idf:v6.0-dev rm -rf /workspace/* /workspace/.??* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Build and run tests
        run: |
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/solaris-v1/components/icm_driver/tests \
            $CI_IMAGE \
            bash -c 'rm -rf build && mkdir build && cd build && cmake .. && make && ctest --verbose'

  generate-docs:
    needs: [build-ci-image, static-analysis]
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" espressif/idf:v6.0-dev rm -rf /workspace/* /workspace/.??* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.CI_GH_TOKEN }}

      - name: Generate documentation
        run: |
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            $CI_IMAGE \
            bash -c '
              doxygen Doxyfile 2>&1
              cd doc/latex && make 2>&1
              cd /workspace
              cp doc/latex/refman.pdf doc/solaris-software.pdf
            '

      - name: Upload documentation PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-documentation
          path: doc/solaris-software.pdf
